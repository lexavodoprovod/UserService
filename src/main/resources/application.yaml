spring:
  application:
    name: UserService
  liquibase:
    enabled: true
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  cache:
    type: redis
    redis:
      time-to-live: 5m
      cache-null-values: false
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080
